<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>整本书阅读 · 课程目录</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "PingFang SC","Microsoft YaHei",sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; flex-direction: column; }

    header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; padding: 20px 28px;
      box-shadow: 0 2px 8px rgba(0,0,0,.15); flex-shrink: 0;
    }
    header h1 { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
    header .sub { font-size: 13px; opacity: .8; margin-top: 4px; }

    .main { flex: 1; padding: 28px; max-width: 1100px; margin: 0 auto; width: 100%; }

    /* 单元分组 */
    .unit-section { margin-bottom: 36px; }
    .unit-title {
      font-size: 15px; font-weight: 700; color: #5c3d9e;
      border-left: 4px solid #764ba2; padding-left: 12px;
      margin-bottom: 16px;
    }

    /* 网格 */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

    .card {
      background: white; border-radius: 12px; padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      border: 2px solid transparent;
      display: flex; flex-direction: column; gap: 10px;
      transition: all .2s;
    }
    .card:hover { border-color: #c5b8f0; box-shadow: 0 4px 20px rgba(102,126,234,.18); transform: translateY(-2px); }

    .card-week {
      font-size: 11px; font-weight: 700; color: #b39ddb;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .card-title { font-size: 16px; font-weight: 700; color: #1a1a2e; line-height: 1.4; }
    .card-desc { font-size: 13px; color: #777; line-height: 1.6; flex: 1; }

    .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag { font-size: 11px; padding: 2px 9px; border-radius: 12px; font-weight: 500; }
    .tag-d6 { background: #e8f4fd; color: #1a73e8; }
    .tag-d7 { background: #e8f8f0; color: #0f9d58; }
    .tag-method { background: #fef3e8; color: #f4511e; }

    .card-footer { border-top: 1px solid #f5f5f5; padding-top: 12px; }
    .open-btn {
      display: block; text-align: center; text-decoration: none;
      background: linear-gradient(135deg, #667eea, #764ba2); color: white;
      padding: 9px 0; border-radius: 8px; font-size: 13px; font-weight: 600;
      transition: opacity .15s;
    }
    .open-btn:hover { opacity: .9; }

    /* 空提示 */
    .coming-soon { opacity: .45; pointer-events: none; }
    .coming-soon .open-btn { background: #ccc; }

    @media (max-width: 600px) {
      .main { padding: 16px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>📚 整本书阅读 · 课程目录</h1>
  <div class="sub">S6《伊索寓言》· 点击课时卡片即可查看完整教学设计</div>
</header>

<div class="main">

  <div class="unit-section">
    <div class="unit-title">U6《伊索寓言》下</div>
    <div class="grid" id="grid-u6"></div>
  </div>

</div>

<script>
const lessons = [
  {
    week: "W22",
    title: "人的故事",
    desc: "精读《牧羊人和野山羊》《牧羊人和狼崽》，探究贪婪与偏心的代价。",
    d6: "内容梳理",
    d7: "运用双气泡图比较阅读",
    url: "lessons/W22.html"
  },
  {
    week: "W23",
    title: "狐狸的故事",
    desc: "精读《狐狸教狼钓鱼》，深入分析狐狸的阴险形象与多重寓意。",
    d6: "内容梳理",
    d7: "联想类比同主题寓言",
    url: "lessons/W23.html"
  },
  {
    week: "W24",
    title: "狐狸的故事（二）",
    desc: "精读《狐狸和葡萄》《断了尾巴的狐狸》，归纳狐狸的多面形象。",
    d6: "内容梳理",
    d7: "借助思维导图归纳形象特点",
    url: "lessons/W24.html"
  }
];

function renderGrid() {
  const grid = document.getElementById('grid-u6');
  grid.innerHTML = lessons.map(l => `
    <div class="card">
      <div class="card-week">${l.week}</div>
      <div class="card-title">${l.title}</div>
      <div class="card-desc">${l.desc}</div>
      <div class="card-tags">
        <span class="tag tag-d6">D6 · ${l.d6}</span>
        <span class="tag tag-method">D7 · ${l.d7}</span>
      </div>
      <div class="card-footer">
        <a class="open-btn" href="${l.url}" target="_blank">查看完整课设 →</a>
      </div>
    </div>
  `).join('');
}

renderGrid();
</script>
</body>
</html>
